<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            display: flex;
            gap: 20px;
        }

        .box {
            background-color: #006400;
            /* Royal green */
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            width: 200px;
        }

        .box-blue {
            background-color: #4169E1;
            /* Royal blue */
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            width: 200px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">
            <h2>Heading 1</h2>
            <p>Paragraph 1</p>
        </div>
        <div class="box">
            <h2>Heading 2</h2>
            <p>Paragraph 2</p>
        </div>
    </div>
    <div class="container">
        <div class="box-blue">
            <h2>Heading 3</h2>
            <p>Paragraph 3</p>
        </div>
        <div class="box-blue">
            <h2>Heading 4</h2>
            <p>Paragraph 4</p>
        </div>
    </div>
</body>

</html>
